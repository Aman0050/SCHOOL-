version: '3.8'

services:
  # Primary Transactional Database
  postgres-primary:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: eduxeno
      POSTGRES_PASSWORD: secure_db_password
      POSTGRES_DB: eduxeno_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata-primary:/var/lib/postgresql/data
    networks:
      - eduxeno-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eduxeno"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Analytical Read Replica
  postgres-replica:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: eduxeno
      POSTGRES_PASSWORD: secure_db_password
      POSTGRES_DB: eduxeno_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata-replica:/var/lib/postgresql/data
    networks:
      - eduxeno-net
    depends_on:
      - postgres-primary

  # Connection Pooler
  pgbouncer:
    image: edoburu/pgbouncer:latest
    environment:
      DATABASE_URL: "postgres://eduxeno:secure_db_password@postgres-primary:5432/eduxeno_db"
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 50
    ports:
      - "6432:6432"
    networks:
      - eduxeno-net
    depends_on:
      - postgres-primary

  # Enterprise Redis Cluster for Cache & Socket.io
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 2gb --maxmemory-policy allkeys-lru --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - eduxeno-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Search Engine Layer
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.2
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    networks:
      - eduxeno-net

  # Node API Servers (Horizontally Scaled)
  api:
    build: 
      context: ./server
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgres://eduxeno:secure_db_password@pgbouncer:6432/eduxeno_db?pgbouncer=true
      - DATABASE_URL_REPLICA=postgres://eduxeno:secure_db_password@postgres-replica:5432/eduxeno_db
      - REDIS_URL=redis://redis:6379
      - AWS_REGION=us-east-1
      - AWS_S3_BUCKET=eduxeno-assets-prod
    ports:
      - "5000:5000"
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    networks:
      - eduxeno-net
    depends_on:
      - pgbouncer
      - redis

volumes:
  pgdata-primary:
  pgdata-replica:
  redisdata:
  esdata:

networks:
  eduxeno-net:
    driver: bridge